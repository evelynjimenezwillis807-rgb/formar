<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Jar 💌</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: linear-gradient(to bottom, #fff1f5, #ffe4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* App container */
.container {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 300px;
}

/* Title */
h1 {
  margin-bottom: 10px;
  font-size: 24px;
}

.subtitle {
  font-size: 14px;
  color: gray;
  margin-bottom: 20px;
}

/* Jar */
.jar {
  width: 120px;
  height: 140px;
  margin: 0 auto 20px;
  background: #ffd6e0;
  border-radius: 60px 60px 30px 30px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.jar:hover {
  transform: scale(1.05);
}

.lid {
  width: 130px;
  height: 25px;
  background: #ff8fab;
  border-radius: 10px;
  position: absolute;
  top: -20px;
  left: -5px;
}

/* Message box */
#message {
  margin-top: 20px;
  font-size: 16px;
  min-height: 50px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* Button */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 15px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff4d6d;
}

/* Floating hearts */
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff6b81;
  transform: rotate(45deg);
  animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff6b81;
  border-radius: 50%;
}

.heart::before {
  top: -7px;
  left: 0;
}

.heart::after {
  left: -7px;
  top: 0;
}

@keyframes float {
  0% {
    transform: translateY(0) rotate(45deg);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px) rotate(45deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>💌 For James</h1>
  <div class="subtitle">Open one each day</div>

  <div class="jar" onclick="getMessage()">
    <div class="lid"></div>
  </div>

  <button onclick="getMessage()">Open Today’s Message</button>

  <div id="message"></div>
</div>

// Day calculation
function getDayNumber() {
  const start = new Date("2026-04-20");
  const today = new Date();
  return Math.floor((today - start) / (1000 * 60 * 60 * 24));
}

function getMessage() {
  const day = getDayNumber();
  const messageBox = document.getElementById("message");

  if (day < 0) {
    messageBox.innerText = "Not unlocked yet 💌";
    messageBox.style.opacity = 1;
    return;
  }

  if (day >= messages.length) {
    messageBox.innerText = "You’ve read all my messages ♥️";
    messageBox.style.opacity = 1;
    return;
  }

 const lastOpened = localStorage.getItem("lastOpenedDay");

if (lastOpened !== null && Number(lastOpened) >= day) {
    messageBox.innerText = "Come back tomorrow (:";
    messageBox.style.opacity = 1;
    return;
}

  messageBox.innerText = messages[day];
  messageBox.style.opacity = 1;

  localStorage.setItem("lastOpenedDay", day);

  createHearts();
}

// Heart animation
function createHearts() {
  for (let i = 0; i < 10; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }
}
