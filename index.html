<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Jar 💌</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: linear-gradient(to bottom, #fff1f5, #ffe4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* App container */
.container {
  text-align: center;
  background: white;
  padding: 30px;
  border-radius: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 300px;
}

/* Title */
h1 {
  margin-bottom: 10px;
  font-size: 24px;
}

.subtitle {
  font-size: 14px;
  color: gray;
  margin-bottom: 20px;
}

/* Jar */
.jar {
  width: 120px;
  height: 140px;
  margin: 0 auto 20px;
  background: #ffd6e0;
  border-radius: 60px 60px 30px 30px;
  position: relative;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.jar:hover {
  transform: scale(1.05);
}

.lid {
  width: 130px;
  height: 25px;
  background: #ff8fab;
  border-radius: 10px;
  position: absolute;
  top: -20px;
  left: -5px;
}

/* Message box */
#message {
  margin-top: 20px;
  font-size: 16px;
  min-height: 50px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* Button */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 15px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff4d6d;
}

/* Floating hearts */
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff6b81;
  transform: rotate(45deg);
  animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: #ff6b81;
  border-radius: 50%;
}

.heart::before {
  top: -7px;
  left: 0;
}

.heart::after {
  left: -7px;
  top: 0;
}

@keyframes float {
  0% {
    transform: translateY(0) rotate(45deg);
    opacity: 1;
  }
  100% {
    transform: translateY(-800px) rotate(45deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>💌 For Mar</h1>
  <div class="subtitle">Open one each day</div>

  <div class="jar" onclick="getMessage()">
    <div class="lid"></div>
  </div>

  <button onclick="getMessage()">Open Today’s Message</button>

  <div id="message"></div>
</div>

<script>
const messages = [
  "Hi lol im so proud of you, you bring me so much joy and never fail to make me smile!",
  "Hi beautiful girl, I hope this code is working lollll. I hope you have an amazing day! You are amazing ♥️",
  "HI MAMAAAA!  I feel so lucky I get to be your friend, I hit the jackpot.",
  "You’re my favorite person. I love you so so so so much mama",
  "Thinking about you always, im so proud of you",
  "I cant express how much I miss being with you in class and at universal UGHHHH " ,
  "You are the diddy to my blud",
  "I admire so much how dedicated and persitent you are. You inspire me to work harder, and not let things run me over.",
  "Im so grateful for you.",
  "I like to carry you with me while doing all the simple, and hard, tasks.",
  "IM CHEERING YOU ON YOU ARE THE BEST",
  "I like who I am when I am with you.",
  "Hi mar. I love you.",
  "thank you for treating me with so much respect and kindness. it means more to me than I could ever convey", 
  "I cant wait to see you continue to do so many amazing and impressive things. Im so proud of you",
  "You are remarkably beautiful, mar, never forget! 9/11 lol",
  "Hi lovey, I hope you have an amazing day. Im so thankful for you and proud of you!",
  "you make me feel a lot less heavy and bring me a lot of light. thank you for that!",
  "you dont have to prove anyhting, im so proud of you for just existing and beign who you are.",
  "im here for you whevnever you need me",
  "i trust you, and that is not a small thing for me",
  "you make me laugh so hard thank you ",
  "hope your day is going well, im sending you love!',
  "i love how you listen and understand me",
  "i hope you are getting rest and taking good care of yourself",
  "i wish you were here, no one compares to you",
  "youre adorable i love you",
  "heart heart heart heart heart heart heart heart heart heart heart heart"  
];

// Day calculation
function getDayNumber() {
  const start = new Date("2026-04-21");
  const today = new Date();
  return Math.floor((today - start) / (1000 * 60 * 60 * 24));
}

function getMessage() {
  const day = getDayNumber();
  const messageBox = document.getElementById("message");

  if (day < 0) {
    messageBox.innerText = "Not unlocked yet 💌";
    messageBox.style.opacity = 1;
    return;
  }

  if (day >= messages.length) {
    messageBox.innerText = "You’ve read all my messages ♥️";
    messageBox.style.opacity = 1;
    return;
  }

 const lastOpened = localStorage.getItem("lastOpenedDay");

if (lastOpened !== null && Number(lastOpened) >= day) {
    messageBox.innerText = "Come back tomorrow (:";
    messageBox.style.opacity = 1;
    return;
}

  messageBox.innerText = messages[day];
  messageBox.style.opacity = 1;

  localStorage.setItem("lastOpenedDay", day);

  createHearts();
}

// Heart animation
function createHearts() {
  for (let i = 0; i < 10; i++) {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }
}
</script>

</body>
</html>
